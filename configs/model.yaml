embedding:
  active_backend: sentence_transformer

  sentence_transformer:
    model_name: sentence-transformers/all-MiniLM-L6-v2
    device: null
    batch_size: 32
    normalize_embeddings: true
    local_files_only: true

  # Optional future backend example. Keep this commented until you add
  # an OpenAI-based embedding adapter and want to switch active_backend.
  # openai:
  #   model: text-embedding-3-large
  #   api_key_env: OPENAI_API_KEY

llm:
  active_backend: llamacpp

  llamacpp:
    # Baseline local model: Qwen3-14B GGUF file path.
    model_path: models/Qwen3-14B-Q4_K_M.gguf
    n_ctx: 8192
    n_gpu_layers: -1
    temperature: 0.1
    max_tokens: 1024
    top_p: 0.9
    stop: []
    seed: 42
    chat_format: null
    verbose: false

  # Optional future backend example for local non-llama.cpp providers.
  local:
    provider: null
    model_path: null
    temperature: 0.0
    max_tokens: null
