eval:
  dataset:
    name: fastapi_tutorial_retrieval_gt
    path: data/eval/retrieval_gt.jsonl
    source_corpus: data/raw
    chunk_source: data/processed/chunks_markdown.jsonl
    generated_by: ChatGPT 5.5
    reviewed: true

  retrieval:
    mode: pipeline
    k_values: [1, 3, 5, 10]
    primary_metrics:
      - recall@5
      - recall@10
      - precision@5
      - mrr@10
      - hit_rate@5

  ragas:
    enabled: true
    reference_field: reference_answer
