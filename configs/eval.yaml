eval:
  dataset:
    name: fastapi_tutorial_retrieval_sources_gt
    path: data/eval/retrieval_sources_gt.jsonl
    source_corpus: data/raw
    chunk_source: data/processed/chunks_base.jsonl
    generated_by: scripts.run_eval
    reviewed: false

  retrieval:
    mode: pipeline
    k_values: [1, 3, 5, 10]
    primary_metrics:
      - recall@5
      - recall@10
      - precision@5
      - mrr@10
      - hit_rate@5

  ragas:
    enabled: true
    reference_field: reference_answer
