retrieval:
  pipeline:
    enabled: true
    run_reranker: true
    run_context_builder: true

  llamaindex:
    top_k: 30
    model_config_path: configs/model.yaml

    qdrant:
      collection_name: documents
      url: http://localhost:6333
      api_key_env: null
      prefer_grpc: false

  reranker:
    active_backend: cross_encoder
    top_k: 10

    cross_encoder:
      # BGE rerankers score query/passage pairs directly. The raw score is
      # not bounded to [0, 1], so keep sigmoid disabled for rank ordering.
      model_name: BAAI/bge-reranker-base
      batch_size: 16
      max_length: 512
      device: cuda
      local_files_only: false
      use_sigmoid: false

  context_builder:
    max_chunks: 5
    max_chars: 4000
    dedup_by_document: true
    chunk_separator: "\n\n"
