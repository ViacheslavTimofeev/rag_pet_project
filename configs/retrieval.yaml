retrieval:
  pipeline:
    enabled: true # [true, false]
    run_reranker: true # [true, false]
    run_context_builder: true # [true, false]

  llamaindex:
    top_k: 50 # [positive integer]
    model_config_path: configs/model.yaml # [path string]

    qdrant:
      collection_name: documents # [non-empty string]
      url: http://localhost:6333 # [URL string]
      api_key_env: null # [environment variable name, null]
      prefer_grpc: false # [true, false]

  reranker:
    active_backend: cross_encoder # [cross_encoder, identity]
    top_k: 10 # [positive integer, null]

    cross_encoder:
      # BGE rerankers score query/passage pairs directly. The raw score is
      # not bounded to [0, 1], so keep sigmoid disabled for rank ordering.
      model_name: BAAI/bge-reranker-base # [non-empty string]
      batch_size: 16 # [positive integer]
      max_length: 512 # [positive integer, null]
      device: cuda # [cuda, cpu, mps, auto]
      local_files_only: false # [true, false]
      use_sigmoid: false # [true, false]

  context_builder:
    max_chunks: 5 # [positive integer, null]
    max_chars: 4000 # [positive integer, null]
    dedup_by_document: true # [true, false]
    chunk_separator: "\n\n" # [non-empty string]
