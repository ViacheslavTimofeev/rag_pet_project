retrieval:
  pipeline:
    enabled: true
    run_reranker: true
    run_context_builder: true

  llamaindex:
    top_k: 5
    model_config_path: configs/model.yaml

    qdrant:
      collection_name: documents
      url: http://localhost:6333
      api_key_env: null
      prefer_grpc: false

  reranker:
    active_backend: identity
    top_k: 5

    # cross_encoder:
    #   model_name: BAAI/bge-reranker-base
    #   batch_size: 32

  context_builder:
    max_chunks: 5
    max_chars: 4000
    dedup_by_document: true
    chunk_separator: "\n\n"
